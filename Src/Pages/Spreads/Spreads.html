<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Spreads - Thoth Temple Tarot</title>
  <link rel="stylesheet" href="./Spreads.css">
</head>
<body>

  <h1>Tarot Spreads</h1>

  <!-- Question -->
  <div class="input-group">
    <label>Your Question:</label>
    <input id="question" type="text" placeholder="Ask the tarot..." />
  </div>

  <!-- Spread selector -->
  <div class="input-group">
    <label>Select Spread:</label>
    <select id="spread-type">
      <option value="three_card">Past - Present - Future</option>
      <option value="celtic_cross">Celtic Cross</option>
    </select>
  </div>

  <!-- Button -->
  <button id="spread-btn">Ask the Tarot</button>

  <!-- Result -->
  <div id="spread-container"></div>

  <script type="module" src="./Spreads.js"></script>
</body>
</html>
